<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 18 18" shape-rendering="crispEdges">
  <!-- bowl outer -->
  <ellipse cx="9" cy="14" rx="8" ry="3.5" fill="#1a4a30"/>
  <rect x="1" y="6" width="16" height="8" fill="#246040"/>
  <!-- bowl rim -->
  <ellipse cx="9" cy="6" rx="8" ry="3" fill="#0f3520"/>
  <ellipse cx="9" cy="6" rx="7" ry="2.4" fill="#2f7a52"/>
  <!-- ceviche broth (lime green) -->
  <ellipse cx="9" cy="6" rx="6.5" ry="2.2" fill="#9ed64a"/>
  <ellipse cx="9" cy="6" rx="5.5" ry="1.8" fill="#c9ee78"/>
  <!-- shrimp (pink curls) -->
  <rect x="5" y="5" width="2" height="1" fill="#ff8a5a"/>
  <rect x="5" y="6" width="1" height="1" fill="#ff8a5a"/>
  <rect x="6" y="7" width="2" height="1" fill="#ff8a5a"/>
  <rect x="11" y="5" width="2" height="1" fill="#ff6a3a"/>
  <rect x="11" y="6" width="1" height="1" fill="#ff6a3a"/>
  <rect x="12" y="6" width="1" height="1" fill="#ff8a5a"/>
  <!-- red onion -->
  <rect x="9" y="5" width="1" height="1" fill="#a83c8a"/>
  <rect x="8" y="7" width="1" height="1" fill="#a83c8a"/>
  <!-- lime wedge -->
  <rect x="13" y="4" width="2" height="2" fill="#dfff60"/>
  <rect x="13" y="4" width="1" height="1" fill="#a8e040"/>
  <!-- cilantro -->
  <rect x="3" y="6" width="1" height="1" fill="#1aa030"/>
  <rect x="14" y="7" width="1" height="1" fill="#1aa030"/>
</svg>
