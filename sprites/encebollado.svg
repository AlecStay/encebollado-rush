<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 18 18" shape-rendering="crispEdges">
  <!-- bowl outer -->
  <ellipse cx="9" cy="14" rx="8" ry="3.5" fill="#8b3a1f"/>
  <rect x="1" y="6" width="16" height="8" fill="#a9482a"/>
  <!-- bowl rim -->
  <ellipse cx="9" cy="6" rx="8" ry="3" fill="#5a2410"/>
  <ellipse cx="9" cy="6" rx="7" ry="2.4" fill="#c95c30"/>
  <!-- broth (tomato/yuca soup) -->
  <ellipse cx="9" cy="6" rx="6.5" ry="2.2" fill="#e07b1f"/>
  <ellipse cx="9" cy="6" rx="5.5" ry="1.8" fill="#f29030"/>
  <!-- onion rings (white curls) -->
  <rect x="5" y="5" width="3" height="1" fill="#ffffff"/>
  <rect x="5" y="6" width="1" height="1" fill="#ffffff"/>
  <rect x="7" y="6" width="1" height="1" fill="#ffffff"/>
  <rect x="10" y="6" width="3" height="1" fill="#ffffff"/>
  <rect x="10" y="7" width="1" height="1" fill="#ffffff"/>
  <rect x="12" y="7" width="1" height="1" fill="#ffffff"/>
  <!-- tuna chunks -->
  <rect x="6" y="7" width="2" height="1" fill="#5a2010"/>
  <rect x="11" y="5" width="2" height="1" fill="#5a2010"/>
  <!-- cilantro -->
  <rect x="8" y="5" width="1" height="1" fill="#3aa030"/>
  <rect x="9" y="7" width="1" height="1" fill="#3aa030"/>
  <!-- highlight -->
  <rect x="4" y="5" width="2" height="1" fill="#ffc878" opacity="0.7"/>
</svg>
