<svg xmlns="http://www.w3.org/2000/svg" width="36" height="18" viewBox="0 0 36 18" shape-rendering="crispEdges">
  <!-- top-down boat, points down (toward player) -->
  <!-- hull outer (darker brown) -->
  <polygon points="2,2 34,2 32,14 30,16 6,16 4,14" fill="#5a3520"/>
  <!-- hull deck (lighter) -->
  <polygon points="4,3 32,3 30,13 28,15 8,15 6,13" fill="#8b5a3a"/>
  <!-- wood planks -->
  <rect x="6" y="6" width="24" height="1" fill="#5a3520"/>
  <rect x="6" y="9" width="24" height="1" fill="#5a3520"/>
  <rect x="6" y="12" width="24" height="1" fill="#5a3520"/>
  <!-- cabin -->
  <rect x="14" y="4" width="8" height="6" fill="#c8c8d0"/>
  <rect x="15" y="5" width="6" height="2" fill="#3a4a6a"/>
  <!-- bow point (top) -->
  <polygon points="17,0 19,0 18,2" fill="#3a2010"/>
  <!-- motor at back -->
  <rect x="16" y="15" width="4" height="3" fill="#222226"/>
</svg>
