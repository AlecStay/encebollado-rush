<svg xmlns="http://www.w3.org/2000/svg" width="28" height="14" viewBox="0 0 28 14" shape-rendering="crispEdges">
  <!-- top-down shark, swimming downward -->
  <!-- tail (top) -->
  <polygon points="12,0 16,0 15,3 13,3" fill="#3d4550"/>
  <!-- body main silhouette -->
  <polygon points="11,3 17,3 19,6 18,11 14,13 10,11 9,6" fill="#4a5560"/>
  <!-- back (darker) -->
  <polygon points="12,3 16,3 17,6 16,8 12,8 11,6" fill="#3d4550"/>
  <!-- side fins -->
  <polygon points="9,7 6,9 9,9" fill="#3d4550"/>
  <polygon points="19,7 22,9 19,9" fill="#3d4550"/>
  <!-- dorsal fin (highlight on back) -->
  <polygon points="13,5 15,5 14,7" fill="#2a3038"/>
  <!-- belly hint near head -->
  <rect x="12" y="11" width="4" height="1" fill="#7a8590"/>
  <!-- snout / head -->
  <polygon points="13,13 15,13 14,14" fill="#3d4550"/>
  <!-- eye glints -->
  <rect x="11" y="9" width="1" height="1" fill="#ffeb55"/>
  <rect x="16" y="9" width="1" height="1" fill="#ffeb55"/>
  <!-- teeth hint -->
  <rect x="13" y="12" width="1" height="1" fill="#ffffff"/>
  <rect x="14" y="12" width="1" height="1" fill="#ffffff"/>
</svg>
