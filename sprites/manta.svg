<svg xmlns="http://www.w3.org/2000/svg" width="20" height="16" viewBox="0 0 20 16" shape-rendering="crispEdges">
  <!-- top-down manta ray, wings spread -->
  <!-- wings (broad triangles) -->
  <polygon points="0,8 7,4 7,10" fill="#2a3a5c"/>
  <polygon points="20,8 13,4 13,10" fill="#2a3a5c"/>
  <!-- wing highlights -->
  <polygon points="2,8 6,6 6,9" fill="#3d527a"/>
  <polygon points="18,8 14,6 14,9" fill="#3d527a"/>
  <!-- body central -->
  <rect x="7" y="3" width="6" height="10" fill="#1f2a44"/>
  <rect x="8" y="4" width="4" height="8" fill="#2a3a5c"/>
  <!-- head cephalic fins (front) -->
  <rect x="7" y="2" width="2" height="2" fill="#1f2a44"/>
  <rect x="11" y="2" width="2" height="2" fill="#1f2a44"/>
  <!-- white belly markings (top of body, since top-down with belly down) -->
  <rect x="9" y="6" width="2" height="3" fill="#a8b8d8"/>
  <!-- tail -->
  <rect x="9" y="13" width="2" height="2" fill="#1f2a44"/>
  <rect x="9" y="15" width="1" height="1" fill="#1f2a44"/>
  <!-- eye dots -->
  <rect x="8" y="3" width="1" height="1" fill="#000000"/>
  <rect x="11" y="3" width="1" height="1" fill="#000000"/>
</svg>
