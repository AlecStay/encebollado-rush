<svg xmlns="http://www.w3.org/2000/svg" width="18" height="28" viewBox="0 0 18 28" shape-rendering="crispEdges">
  <!-- top-down view: head at top, fins at bottom -->
  <!-- swim fins -->
  <rect x="3" y="22" width="4" height="5" fill="#1a4a6e"/>
  <rect x="11" y="22" width="4" height="5" fill="#1a4a6e"/>
  <!-- body / wetsuit torso -->
  <rect x="5" y="9" width="8" height="14" fill="#1f6aa5"/>
  <rect x="6" y="10" width="6" height="12" fill="#2a83c7"/>
  <!-- arms tucked along body -->
  <rect x="3" y="11" width="2" height="8" fill="#e8b27a"/>
  <rect x="13" y="11" width="2" height="8" fill="#e8b27a"/>
  <!-- head -->
  <rect x="6" y="2" width="6" height="7" fill="#f0c08a"/>
  <rect x="6" y="2" width="6" height="2" fill="#3a2a1a"/>
  <!-- mask/goggles -->
  <rect x="6" y="4" width="6" height="2" fill="#0a0a14"/>
  <rect x="7" y="5" width="2" height="1" fill="#7fdfff"/>
  <rect x="10" y="5" width="2" height="1" fill="#7fdfff"/>
  <!-- snorkel -->
  <rect x="12" y="3" width="1" height="4" fill="#ffaa33"/>
</svg>
